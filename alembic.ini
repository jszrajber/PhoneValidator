[alembic]
# Lokalizacja skryptów migracji (katalog alembic/ obok tego pliku)
script_location = %(here)s/alembic

# Dodaj korzeń repozytorium do sys.path, żeby alembic mógł importować
# pakiety projektu (backend.*) gdy jest uruchamiany z poziomu katalogu root.
prepend_sys_path = %(here)s

path_separator = os

# Placeholder URL — env.py nadpisuje tę wartość w czasie wykonania
# na podstawie backend.core.config.settings.DATABASE_URL (wersja sync).
sqlalchemy.url = postgresql://user:pass@localhost/dbname


[post_write_hooks]
# Odkomentuj poniższe, żeby automatycznie formatować nowe pliki migracji:
# hooks = ruff
# ruff.type = exec
# ruff.executable = ruff
# ruff.options = check --fix REVISION_SCRIPT_FILENAME


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S